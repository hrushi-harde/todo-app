<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TO DO Application</title>

    <link rel="stylesheet" href="style.css">

    <!-- Toastify -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
    <script src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
</head>

<body>

<h1 id="heading">TO DO List</h1>
<div id="displayContainer">Loading tasks...</div>

<div class="container">
    <input type="text" id="task" placeholder="Enter your task..." />
    <select id="priority" class="selects">
        <option value="high">High</option>
        <option value="medium">Medium</option>
        <option value="low">Low</option>
    </select>
    <button onclick="addTask()" class="btn">Add Task</button>
</div>

<script>
document.addEventListener("DOMContentLoaded", () => {

const API_URL = "https://todo-backend-o6jo.onrender.com";

// Toast
function showToast(message, color) {
    Toastify({
        text: message,
        duration: 2000,
        gravity: "top",
        position: "right",
        style: { background: color }
    }).showToast();
}

// Load tasks
async function loadTasks(){
    let display = document.getElementById('displayContainer');
    display.innerHTML = "Loading tasks...";

    try {
        let res = await fetch(`${API_URL}/tasks`);
        let data = await res.json();
        displayTask(data);
    } catch (error) {
        display.innerHTML = "<h2>❌ Failed to load tasks</h2>";
        console.error(error);
    }
}

// Add Task
window.addTask = async function (){
    let task = document.getElementById('task').value;
    let priority = document.getElementById('priority').value;

    if(task.trim() === ""){
        showToast("Enter task first", "orange");
        return;
    }

    console.log("🚀 Sending request..."); // DEBUG

    try {
        let res = await fetch(`${API_URL}/tasks`, {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ task, priority })
        });

        console.log("Response:", res);

        showToast("Task Added", "green");

        document.getElementById('task').value = "";
        loadTasks();

    } catch (error) {
        console.error(error);
    }
};

// Display
function displayTask(tasks){
    let display = document.getElementById('displayContainer');
    display.innerHTML = "";

    tasks.forEach(t => {
        display.innerHTML += `
        <div>
            <h3>${t.task} - ${t.priority}</h3>
            <button onclick="deleteTask(${t.id})">Complete</button>
        </div>`;
    });
}

// Delete
window.deleteTask = async function(id){
    await fetch(`${API_URL}/tasks/${id}`, {
        method: "DELETE"
    });
    loadTasks();
};

// Enter key fix
document.getElementById("task").addEventListener("keypress", function(e) {
    if (e.key === "Enter") {
        addTask();
    }
});

loadTasks();

});
</script>
