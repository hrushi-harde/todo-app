```

</head>
<body>

<h1 id="heading">TO DO List</h1>
<div id="displayContainer">Loading tasks...</div>

<div class="container">
    <input type="text" id="task" placeholder="Enter your task..." />
    <select id="priority" class="selects">
        <option value="high">High</option>
        <option value="medium">Medium</option>
        <option value="low">Low</option>
    </select>
    <button onclick="addTask()" class="btn">Add Task</button>
</div>

<script>
const API_URL = "https://todo-backend-o6jo.onrender.com";

// Toast
function showToast(message, color) {
    Toastify({
        text: message,
        duration: 2000,
        gravity: "top",
        position: "right",
        style: {
            background: color
        }
    }).showToast();
}

// Load tasks
async function loadTasks(){
    let display = document.getElementById('displayContainer');
    display.innerHTML = "Loading tasks...";

    try {
        let res = await fetch(`${API_URL}/tasks`);

        if(!res.ok) throw new Error("Fetch failed");

        let data = await res.json();
        displayTask(data);

    } catch (error) {
        display.innerHTML = "<h2> Failed to load tasks</h2>";
        showToast("Server not responding", "#f44336");
        console.error(error);
    }
}

window.onload = loadTasks;

// Add Task
async function addTask(){
    let taskElement = document.getElementById('task');
    let priorityElement = document.getElementById('priority');

    if(taskElement.value.trim() === ""){
        showToast(" Enter a task first", "#ff9800");
        return;
    }

    try {
        let res = await fetch(`${API_URL}/tasks`, {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                task: taskElement.value,
                priority: priorityElement.value
            })
        });

        if(!res.ok) throw new Error("Add failed");

        showToast(" Task Added", "#4caf50");

        taskElement.value = "";
        loadTasks();

    } catch (error) {
        showToast(" Failed to add task", "#f44336");
        console.error(error);
    }
}

// Display Tasks
function displayTask(tasks){
    let display = document.getElementById('displayContainer');

    if(tasks.length === 0){
        display.innerHTML = "<h2>No tasks yet...</h2>";
        return;
    }

    display.innerHTML = "";

    tasks.forEach(task => {
        display.innerHTML += `
        <div id="displayContainers">
            <h1 class="h1tag">${task.task}</h1>
            <h2 class="h2tag">${task.priority}</h2>
            <button class="btn2" onclick="deleteTask(${task.id})">✔ Complete</button>
        </div>`;
    });
}

// Delete Task
async function deleteTask(taskId) {
    try {
        let res = await fetch(`${API_URL}/tasks/${taskId}`, {
            method: "DELETE"
        });

        if(!res.ok) throw new Error("Delete failed");

        showToast("🎉 Task Completed", "#2196f3");
        loadTasks();

    } catch (error) {
        showToast(" Failed to delete task", "#f44336");
        console.error(error);
    }
}

// Enter key support
document.getElementById("task").addEventListener("keypress", function(e) {
    if (e.key === "Enter") {
        addTask();
    }
});
</script>

</body>
</html>
